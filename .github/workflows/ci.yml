name: CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Show Python version
        run: python --version

      - name: Compile source files
        run: |
          python -m py_compile main.py
          python -m py_compile link_manager\app.py
          python -m py_compile link_manager\scanner.py
          python -m py_compile link_manager\link_ops.py
          python -m py_compile link_manager\models.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  build-windows:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tool
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build executable
        run: python -m PyInstaller --noconfirm --clean --onefile --windowed --name LinkScope main.py

      - name: Package release asset
        id: package
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME
          } else {
            $version = "manual-$env:GITHUB_RUN_NUMBER"
          }
          $asset = "LinkScope-$version-windows-x64.zip"
          Compress-Archive -Path dist\LinkScope.exe -DestinationPath $asset -Force
          "asset=$asset" >> $env:GITHUB_OUTPUT

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: ${{ steps.package.outputs.asset }}

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.asset }}
